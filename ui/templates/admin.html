<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Administración - PATOS</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f9f9f9; margin: 0; padding: 0; }
        .admin-panel { background: white; padding: 40px; border-radius: 10px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin: 50px auto; max-width: 1000px; }
        h2 { color: #ff6b00; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; }
        th { background-color: #ff6b00; color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        tr:hover { background-color: #fff5ed; }
    </style>
</head>
<body>

<section class="admin-panel">
    <h2>Gestión de Usuarios (CRUD)</h2>
    <p>Desde aquí puedes administrar las cuentas de la tienda.</p>
    <button id="btn-nuevo-usuario" style="margin-bottom: 20px; padding: 10px 20px; background-color: #ff6b00; color: white; border: none; cursor: pointer; border-radius: 5px; font-weight: bold;">
        + Añadir Nuevo Usuario
    </button>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Nombre</th>
                <th>Email</th>
                <th>Rol</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody id="tabla-usuarios"></tbody>
    </table>

    <template id="molde-usuario">
        <tr>
            <td class="user-id"></td>
            <td class="user-nombre"></td>
            <td class="user-email"></td>
            <td class="user-rol"></td>
            <td>
                <button class="btn-editar" style="padding: 5px 10px; cursor: pointer; border-radius: 3px; border: 1px solid #ccc;">Editar</button>
                <button class="btn-borrar" style="padding: 5px 10px; cursor: pointer; background-color: #dc3545; color: white; border: none; border-radius: 3px; margin-left: 5px;">Borrar</button>
            </td>
        </tr>
    </template>
</section>

<div id="modal-usuario" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000;">
    <div style="background: white; width: 400px; margin: 100px auto; padding: 30px; border-radius: 8px; position: relative;">
        <h3 id="modal-titulo">Añadir Nuevo Usuario</h3>
        <form id="form-nuevo-usuario">
            <input type="hidden" id="edit-id"> <div style="margin-bottom: 15px;">
                <label>Nombre:</label><br>
                <input type="text" id="add-nombre" required style="width: 100%; padding: 8px; border: 1px solid #ccc;">
            </div>
            <div style="margin-bottom: 15px;">
                <label>Email:</label><br>
                <input type="email" id="add-email" required style="width: 100%; padding: 8px; border: 1px solid #ccc;">
            </div>
            <div style="margin-bottom: 20px;">
                <label>Contraseña:</label><br>
                <input type="password" id="add-password" style="width: 100%; padding: 8px; border: 1px solid #ccc;">
            </div>
            <button type="submit" style="background: #ff6b00; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px;">Guardar Usuario</button>
            <button type="button" id="btn-cancelar" style="background: #ccc; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; margin-left: 10px;">Cancelar</button>
        </form>
    </div>
</div>

<script src="/static/js/admin.js"></script>
</body>
</html>
