<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - PATOS</title>
    <link rel="icon" href="/static/img/favicon.png" type="image/x-icon"> <!--icono de la página-->
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Syncopate:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/main.css">
</head>
<body class="auth-body">

    <header class="header__bar" style="justify-content: center;">
        <a href="/">
            <img src="/static/img/logo.png" alt="Logo PATOS" class="header__logo">
        </a>
    </header>

    <main class="auth-page">
        <div class="auth-box">
            <div class="auth-box__header">
                <a href="/login" class="auth-box__link--switch">¿Ya tienes cuenta? Entra aquí</a>
            </div>
            <form action="/procesar-registro" method="POST" class="auth-form auth-form--active">
                <h1 class="auth-box__title">Únete a nosotros</h1>
                <p class="auth-box__subtitle">Crea tu cuenta de forma rápida y segura.</p>

                <div class="auth-form__group">
                    <label class="auth-form__label">Nombre completo</label>
                    <input type="text" name="nombre" class="auth-form__input" required> 
                </div>
                <div class="auth-form__group">
                    <label class="auth-form__label">Correo electrónico</label>
                    <input type="email" name="email" class="auth-form__input" required>
                </div>
                <div class="auth-form__group">
                    <label class="auth-form__label">Contraseña</label>
                    <div class="auth-form__password-wrapper">
                        <input type="password" name="password" id="reg-password" class="auth-form__input" required>
                        
                        <button type="button" class="auth-form__eye-btn" onclick="togglePassword('reg-password', this)">
                            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="auth-form__btn">Crear cuenta</button>
            </form>
        </div>
    </main>

    <script>
        function togglePassword(inputId, button) {
            const input = document.getElementById(inputId);
            
            // Los dos iconos SVG en formato texto
            const eyeOpen = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>`;
            const eyeClosed = `<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24M1 1l22 22"></path></svg>`;

            // Si es tipo password, lo pasamos a texto y ponemos el ojo tachado
            if (input.type === 'password') {
                input.type = 'text';
                button.innerHTML = eyeClosed;
            } else {
                // Si es texto, lo ocultamos y ponemos el ojo abierto
                input.type = 'password';
                button.innerHTML = eyeOpen;
            }
        }
    </script>

</body>
</html>
